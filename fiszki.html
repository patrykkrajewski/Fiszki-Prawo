<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiszki - Obrona Inżynierska</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .dashboard {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }
        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
            min-width: 120px;
        }
        .stat-box h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #2980b9;
        }
        .stat-box p {
            margin: 5px 0;
            font-size: 14px;
        }
        .text-green { color: #27ae60; font-weight: bold; }
        .text-red { color: #c0392b; font-weight: bold; }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        select, button, label {
            font-size: 16px;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: #f9f9f9;
        }
        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .btn-start {
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
            font-size: 18px;
        }
        .btn-start:hover { background: #2980b9; }
        .btn-reset {
            background: #ecf0f1;
            color: #7f8c8d;
            border: 1px solid #bdc3c7;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
            padding: 8px;
        }
        .btn-reset:hover { background: #e74c3c; color: white; border-color: #e74c3c; }

        /* Sekcja Fiszek */
        .progress-text {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-size: 18px;
            display: none;
        }
        .flashcard-wrapper {
            display: none;
            width: 100%;
            max-width: 700px;
            perspective: 1000px;
            margin-bottom: 25px;
        }
        .flashcard {
            width: 100%;
            min-height: 400px;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }
        .card-front {
            color: #2c3e50;
            text-align: center;
        }
        .card-front h2 { font-size: 24px; line-height: 1.4; }
        .card-back {
            background: #fdfefe;
            transform: rotateY(180deg);
            color: #34495e;
            justify-content: flex-start;
            text-align: left;
        }
        .card-back p { line-height: 1.6; margin-bottom: 10px; width: 100%; font-size: 16px; }

        .action-buttons {
            display: none;
            width: 100%;
            max-width: 700px;
            justify-content: space-between;
            gap: 15px;
        }
        .btn-know { background: #2ecc71; color: white; flex: 1; padding: 15px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}
        .btn-know:hover { background: #27ae60; }
        .btn-dont-know { background: #e74c3c; color: white; flex: 1; padding: 15px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}
        .btn-dont-know:hover { background: #c0392b; }
        
        .btn-back-home {
            display: none;
            background: #95a5a6;
            color: white;
            width: 100%;
            max-width: 700px;
            margin-top: 15px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-back-home:hover { background: #7f8c8d; }
    </style>
</head>
<body>

    <h1>🎓 Obrona Inżynierska - Fiszki</h1>

    <div class="dashboard" id="dashboard">
        <h2 style="margin-top: 0; text-align: center; color: #34495e;">Twoje Statystyki</h2>
        <div class="stats-container" id="statsContainer">
            </div>

        <div class="controls">
            <select id="prioritySelect">
                <option value="all">Wszystkie Priorytety</option>
                <option value="1">Tylko Priorytet 1</option>
                <option value="2">Tylko Priorytet 2</option>
                <option value="3">Tylko Priorytet 3</option>
            </select>
            
            <label class="checkbox-group">
                <input type="checkbox" id="onlyUnknown">
                Pomiń pytania, które "Umiem"
            </label>

            <button class="btn-start" onclick="startLearning()">Rozpocznij naukę</button>
            <button class="btn-reset" onclick="resetStats()">Resetuj wszystkie statystyki (zacznij od zera)</button>
        </div>
    </div>

    <div class="progress-text" id="progressText">Karta 1 / 10</div>
    
    <div class="flashcard-wrapper" id="flashcardWrapper" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front" id="cardFront">
                </div>
            <div class="card-face card-back" id="cardBack">
                </div>
        </div>
    </div>

    <div class="action-buttons" id="actionButtons">
        <button class="btn-dont-know" onclick="markCard('unknown', event)">❌ Nie umiem</button>
        <button class="btn-know" onclick="markCard('known', event)">✅ Umiem</button>
    </div>

    <button class="btn-back-home" id="btnBackHome" onclick="goHome()">Powrót do menu</button>

    <script id="rawData" type="text/plain">
Obrona pracy inżynierskiej
Priorytet 1
1.  Omówić protokół HTTP
HTTP (HyperText Transfer Protocol) - protokół warstwy aplikacji działający w modelu klient-serwer (żądanie-odpowiedź), który stanowi fundament komunikacji w sieci WWW oraz definiuje jak informacje (tekst, obrazy) są przesyłane między komputerami nasłuchuje na porcie 80 TCP.
Opiera się na metodach  GET (pobranie),  POST (wysłanie),  PUT/PATCH (aktualizacja),  DELETE (usuwa)
2. Budowanie aplikacji WWW w architekturze MVC Wzorzec architektoniczny dzielący aplikacje na 3 części M (Model reprezentujący dane) V (Widok reprezentujący interfejs użytkownika)  C (Kontroler zarządza komunikacją między M a V).
Ułatwia to separację kodu, testowanie jednostkowe oraz równoległą pracę programistów nad różnymi częściami systemu
Wykorzystują to Frameworki takie jak np. Laravel Symphony, Spring
3. Frameworki wspomagające tworzenie aplikacji WWW w technologiach Java
Przykłady: Jakarta Server Faces i Spring Framework.
JSF – oparty na MVC i komponentach z których budujemy stronę (Facelets)
Spring Framework – najpopularniejszy framework Java, wykorzystujący MCV i wstrzykiwanie zależności, rozszerzeniem jest Spring Boot który rozszerza framework o narzędzia wymagane do uruchomienia aplikacji na serwerze Tomcat.
4. Porównanie struktur danych: stosu, kolejki oraz kolejki priorytetowej
Stos  – LIFO (ostatni wchodzi pierwszy wychodzi), mamy dostęp tylko do ostatniego elementu np. operacja cofania (undo)
Kolejka  – FIFO (pierwszy wchodzi pierwszy wychodzi), szybki dostęp do ostatniego elementu np. kolejka zadań w tym drukowanie
Kolejka Prio  – element o najwyższym priorytecie jest obsługiwany jako pierwszy, niezależnie od tego, kiedy został dodany np.
szeregowanie zadań
5. Drzewa poszukiwań binarnych – charakterystyka i sposoby implementacji
Hierarchiczna struktura drzewa, gdzie każdy węzeł ma co najmniej 2 synów, wartość lewego jest mniejsza od wartości rodzica a prawego większa.
Złożoność przeszukiwania jest bardzo szybka, chyba że drzewo jest w postaci listy wtedy znacznie spada.
Implementacja wskaźnikowa (np. w JAVA), tablicowa(kopiec).
6. Kopce i ich rola w usprawnieniu przetwarzania. Algorytm sortowania kopcowego
Kopiec  – drzewo binarne, gdzie rodzic jest zawsze większy lub mniejszy od dziecka
Rola : Błyskawiczny dostęp do najmniejszego/największego elementu (kluczowe dla np. koleje prio)
Algorytm : Najpierw buduje kopiec, a potem sukcesywnie wyciąga ze szczytu największy element i kładzie go na koniec tablicy.
7. Omówić istotę dziedziczenia
Tworzymy nowe klasy na bazie istniejących, rozszerzając ich funkcjonalności. Jest to dobra prakryt a ponieważ trzymamy się zasady DIR (Don’t Repeat Yourself).
8. Omówić istotę polimorfizmu metod
Ta sama metoda wykonuje różne akcje w zależności od obiektu.
Statyczna – ta sama metoda inne argumenty
Dynamiczna – nadpisujemy klasę bazową
9. Architektura wybranej usługi w sieci TCP/IP
HTTP (HyperText Transfer Protocol ) - protokół warstwy aplikacji działający w modelu klient-serwer (żądanie-odpowiedź), który stanowi fundament komunikacji w sieci WWW oraz definiuje jak informacje (tekst, obrazy) są przesyłane między komputerami nasłuchuje na porcie 80 TCP.
Opiera się na metodach  GET (pobranie),  POST (wysłanie),  PUT/PATCH (aktualizacja),  DELETE (usuwa)
10. Na czym polega normalizacja w relacyjnych bazach danych. Dlaczego jest ważna?
Normalizacja  to proces porządkowania relacyjnej bazy danych, który polega na podziale tabel na mniejsze i połączenie ich relacją.
Jest ważna , ponieważ eliminuje redundancje (nadmiarowość danych) oraz anomalie (błędy niespójności podczas dodawania/edycji/usuwania wierszy)
11. Opisać relacyjny model danych
Zapis informacji w postaci dwuwymiarowych tabel, składających się z wierszy (wartości) i kolumn (atrybutów).
Tabele te są połączone relacją (klucz obcy i podstawowy). Zapewnia to eliminacje redundancji i anomalii.
12. Omówić język programowania SQL
Structured Query Language - Język zapytań używany do zarządzania, manipulowania i pobierania danych z relacyjnych baz danych.
Podstawowymi komendami w nim są CREATE, ALTER, DROP, SELECT, INSERT, UPDATE, DELETE. Kluczowy dla baz danych takich jak MySQL, PostrgeSQL.
Priorytet 2
13. Omówić technologie ASP.NET
Framework WWW stworzony przez firmę Microsoft Corporation. Wykorzystuje się go do pisania usług i aplikacji internetowych z wykorzystaniem wzorca MVC.
Podstawa jest język C# ale ASP .NET umożliwia też dynamiczne tworzenie stron poprzez CSHTML czy Razor który łączy C# i HTML.
14. Selektory: proste, uniwersalne,  „potomka” , „dziecka”,  „rodzeństwa”,  pseudoklasy, pseudoelementy.
Selektory są wykorzystywane w kaskadowym arkuszy styli do dokładnej do identyfikacji elementu w strukturze strony( głównie znaczniki).
Uniwersalne  – „*” wszystkie elementy na stronie np. * { margin: 0; }
Proste  – elementy danego rodzaju: typu (akapit „p”), klasy (kropka), id (#)
Potomka  - gdziekolwiek wewnątrz div p { color: green; }
Dziecka  – bezpośrednio wewnątrz  div > p { color: yellow; }
Rodzeństwo  – zaraz za innym elementem h1 + p { font-weight: bold; }
Pseudoklasy  - konkretny stan lub sytuacja :hover (najedziesz myszą)
Pseudoelementy  – nie ma w kodzie HTML ::after (wstawić coś po zawartości)
15. DOM: współpraca z przeglądarką (obiekty główne przeglądarki, obiekt window, document, history,  location, navigator) i dostęp do elementów witryny.
DOM  (Document Object Model) – obiektowa reprezentacja strony wygenerowana przez silnik przeglądarki w postaci odwróconego drzewa, który składa się z węzłów na których można wykonywać operacje.
Window – osobny dla każdego okna przeglądarki
Document – modelem HTML
History – historia przeglądanych URL
Location – obecny adres URL
Navigator – informacje o przeglądarce
16. Słuchacze w aplikacjach mobilnych.
Słuchacze  to metody służące do asynchronicznej obsługi zdarzeń interfejsu użytkownika, takich jak kliknięcia czy gesty.
Przykładowo deklarujemy słuchacza na przycisku i gdy zostanie on aktywowany słuchacz wywołuje zdeklarowaną w nim metodę np. która wyśle formularz.
17. Rola intencji w aplikacjach mobilnych.
Intencja to obiekt, który używamy, gdy chcemy zażądać działania od innego komponentu.
Jawne – wywołują element wewnątrz aplikacji np. nowy ekran
Niejawne - ogólna akcja system, nie wskazujemy komponentu tylko system sam to robi (np. zrobienie zdjęcia)
18.Na czym polega rekurencja (rekursja)? Przedstaw przykład rekurencyjnej definicji funkcji matematycznej i jej implementacji w wybranym języku programowania.
Funkcja odwołuje się do samej siebie w celu rozwiązania tego samego tylko mniejszego problemu. Konieczność zdeklarowania warunków brzegowych.
Definicja matematyczna Implementacja Python
19.Omówić istotę rekursji.
Funkcja odwołuje się do samej siebie w celu rozwiązania tego samego tylko mniejszego problemu.
Konieczność zdeklarowania warunków brzegowych. Przykład silnia.
20.Czym różni się programowanie niskopoziomowe od wysokopoziomowego?
Poziomem abstrakcji
PW można przenosić między platformy PN nie
PW jeżyk zbliżony do ludzkiego PN język zrozumiały dla komputera
21.Omówić cele i sposoby uruchamiania aplikacji w trybie krokowym (tzw. trybie debugowania) na przykładzie wybranego środowiska programistycznego.
Kontrolowane wykonywanie programu (krok po kroku) służy do dynamicznej analizy i pozwala zobaczyć np. wartość zmiennej w konkretnym momencie.
W Visual Studio realizuje się ja za pomocą breakpoints oraz Step Over, Step Into, Step Out .
22.Wyjaśnij różnicę między emulacją a wirtualizacją oprogramowania i podaj przykłady.
Emulacja  naśladowanie działania innego systemu, nie dzieląc zasobów sprzętowych a jedynie korzystając z nich np.
BlueStacks  (Android na PC)
Wirtualizacja  polega na wydzieleniu fizycznych zasobów komputera i przypisaniu ich do odizolowanego środowiska np. VirtualBox, Docker
23.Zarządzanie pamięcią operacyjną - porównanie segmentacji z stronicowaniem.
Stronicowanie (Podział sprzętowy)  – podział pamięci fizycznej na bloki o równej, z góry określonej wielkości zwane  ramkami  (a pamięci logicznej programu na odpowiadające im  strony ).
Segmentacja (Podział logiczny)  – dzielimy dane na bloki o zmiennej wielkości, wynikające z naturalnej struktury programu (np. osobny segment na kod, osobny na dane).
Bloki te nazywamy  segmentami .
24.Algorytmy szeregowania zadań.
Kto pierwszy ten lepszy - blokuje krótkie zadania
Najkrótsze zadanie pierwsze  -najkrótszy czas oczekiwania ale możliwość, zagłodzenia, czyli zadania z długim czasem będą czekać w nieskończoność
Rotacyjnie  – każde zadanie dostaje równy czas, możliwość straty mocy przez źle dobrany czas
25.Porównanie technik przewidywania i unikania zakleszczeń.
Zakleszczenie to krytyczny błąd systemu, gdzie dwa lub więcej procesów czeka na zwolnienie zasobów w nieskończoność.
Zapobieganie: Polega na narzuceniu systemowi sztywnych reguł, które fizycznie uniemożliwiają zakleszczenie, 100% bezpieczeństwa ale możliwość marnowania zasobów i spadku wydajności.
Unikanie: System na bieżąco analizuje i przewiduje skutki swoich decyzji, lepsze wykorzystanie sprzętu, ale obciążony procesor
26.Omówić techniki uwierzytelniania w systemach operacyjnych Unix i Windows.
Podstawą uwierzytelniania jest hasło użytkownika.
W unix jest ono szyfrowane i zapisywanie /etc/shadow
W Windows dla użytkownika też hasło jest szyfrowane i trzymane lokalnie ale dla firm można skorzystać z usługi Active Directory(zarządzanie kontami dla administratora)
27. Omówić rodzaje chmur obliczeniowych oraz ich zalety i wady
Prywatna  - udostępnia usługi wyłącznie wewnątrz jednej organizacji
Zalety: Pełna kontrola i bezpieczeństwo, wysoka wydajność
Wady: Duży koszt początkowy, Skalowalność, utrzymanie
Publiczna  – udostępnia usługi w ramach globalnych zasobów
Zalety: Natychmiastowa skalowalność, małe koszty początkowe
Wady: Mniejsza kontrola, Powierzanie danych zewnętrznej firmie
Hybrydowa  – łączy publiczną z prywatną, przenosi dane między nimi
Zalety: Optymalizacja bezpieczeństwa i kosztów
Wady: skomplikowana architektura, problemy z kompatybilnością
Priorytet 3
28.   Kodowanie według principiów podanych przez Huffmana.
Algorytm bezstratnej kompresji, polega na budowaniu drzewa binarnego od dołu (łącząc najrzadsze symbole) co pozwala przypisać najkrótsze ciągi bitów najczęściej występującym znakom.
29.   Wymień przykłady algorytmów sortowania o złożoności obliczeniowej O(n2), O(nlogn) i O(n); Omów wybrany algorytm.
O(n2) – Sortowanie bąbelkowe
O(nlogn) – Sortowanie kopcowe, quick sort
O(n) – sportowanie przez zliczanie, kubełkowe
Sortowanie kopcowe – z listy tworzony jest kopiec, z użyciem operacji wynurzania i zanurzania.
30.   Grafy – charakterystyka, rodzaje i sposoby implementacji.
Graf – zbiór wierzchołków połączonych krawędziami
Rodzaje: Skierowane, nieskierowane, ważone (koszt na krawędziach)
Implementacja: Macierz sąsiedztwa, Lista sąsiedztwa
31.   Algorytmy sortowania o złożoności logarytmicznej. Przykłady, istota.
Dedykowane dla dużych zbiorów, działają szybko, działają na zasiądzie dziel i zwyciężaj(dzieli problem na mniejsze części i wydojenie się je łączy).
Sortowanie kopcowe – z listy tworzony jest kopiec, z użyciem operacji wynurzania i zanurzania.
32.   Wymień trzy wybrane modele cyklu życia systemu i wskaż specyfikę przedsięwzięć dla których dany model należy zastosować.
Model kaskadowy  (sztywne ramy)- przebiega liniowo faza po fazie, każdy etap musi być zakończony przed przejściem do następnego.
Powrót jest trudny i kosztowny.
Model spiralny  (drogich i ryzykownych) - nacisk na analizę ryzyka, Projekt rozwija się w iteracjach gdzie każda z nich jest planowana, oceniane jest ryzyko, budowane prototypy i weryfikowana
Model zwinny  (innowacyjnych i komercyjnych) – praca podzielona na krótkie cykle po których klient otrzymuje nie pełny fragment aplikacji i dostosowuje na bieżąco kierunek rozwoju
33.   Wymień role występujące w podejściu SCRUM oraz wskaż główne odpowiedzialności każdej roli.
Product Owner  – Skupia się na tym  CO  ma być wytworzone aby przyniosło największą wartość na rynku.
Reprezentuje biznes.
Scrum Master  - Skupia się na tym,  JAK  zespół pracuje, dbając o płynność działań i zgodność z metodyką Scrum.
Development Team  - Odpowiadają za dostarczenie w każdym Sprincie gotowego przyrostu produktu o wysokiej jakości, samodzielnie planując sposób wykonania zadań.
34.   Wyjaśnij różnicę pomiędzy weryfikacją wymagań a walidacją wymagań.
Weryfikacja  sprawdza zgodność produktu ze specyfikacją techniczną i dokumentacją („czy budujemy produkt właściwie?”).
Walidacja  sprawdza, czy gotowy produkt spełnia rzeczywiste potrzeby i oczekiwania klienta („czy budujemy właściwy produkt?”)
35.   Wskaż kiedy warto zastosować prototypowanie podczas analizy i projektowania systemu. Jakie są wady i zalety takiego podejścia?
Prototypowanie  – proces tworzenia wczesnego uproszczonego modelu oprogramowania, który służy do przetestowania założeń.
Kiedy : niejasne wymagania, skomplikowany interfejs, trudność w komunikacji
Zalety : wczesna walidacja, ograniczenie ryzyka, poprawa jakości
Wady : Czas i koszty początkowe, złudzenie gotowego produktu

                if (line.toLowerCase().includes('priorytet 2')) { currentPriority = 2; continue; }
                if (line.toLowerCase().includes('priorytet 3') || line.toLowerCase().includes('piorytet 3')) { currentPriority = 3; continue; }
                if (line.toLowerCase().includes('obrona pracy inżynierskiej')) continue;

                // Sprawdzamy, czy linijka zaczyna się od numeru i kropki np. "1.", "12."
                const qMatch = line.match(/^(\d+)\.\s*(.*)/);
                
                if (qMatch) {
                    if (currentQuestion) {
                        cards.push(currentQuestion);
                    }
                    currentQuestion = {
                        id: parseInt(qMatch[1], 10), // Identyfikator to numer pytania z pliku
                        priority: currentPriority,
                        q: line,
                        a: []
                    };
                } else if (currentQuestion) {
                    currentQuestion.a.push(line);
                }
            }
            // Dodajemy ostatnie pytanie
            if (currentQuestion) {
                cards.push(currentQuestion);
            }
        }

        function updateStatsUI() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '';
            
            const statsByPrio = {};
            
            cards.forEach(c => {
                if (!statsByPrio[c.priority]) {
                    statsByPrio[c.priority] = { k: 0, u: 0, total: 0 };
                }
                statsByPrio[c.priority].total++;
                if (userStats[c.id] === 'known') statsByPrio[c.priority].k++;
                if (userStats[c.id] === 'unknown') statsByPrio[c.priority].u++;
            });

            // Wyświetlanie statystyk z posortowanymi priorytetami
            Object.keys(statsByPrio).sort().forEach(prio => {
                const p = statsByPrio[prio];
                container.innerHTML += `
                    <div class="stat-box">
                        <h3>Priorytet ${prio}</h3>
                        <p>Suma pytań: ${p.total}</p>
                        <p class="text-green">Umiem: ${p.k}</p>
                        <p class="text-red">Nie umiem: ${p.u}</p>
                    </div>
                `;
            });
        }

        // Tasowanie tablicy
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startLearning() {
            if (cards.length === 0) {
                alert("Błąd: Nie udało się wczytać pytań. Sprawdź format danych.");
                return;
            }

            const prioSelect = document.getElementById('prioritySelect').value;
            const onlyUnknown = document.getElementById('onlyUnknown').checked;

            sessionCards = cards.filter(c => {
                let matchPrio = (prioSelect === 'all') || (c.priority.toString() === prioSelect);
                let matchStatus = onlyUnknown ? (userStats[c.id] !== 'known') : true;
                return matchPrio && matchStatus;
            });

            if (sessionCards.length === 0) {
                alert("Brak pytań spełniających podane kryteria! Prawdopodobnie potrafisz już wszystko z wybranego działu.");
                return;
            }

            shuffleArray(sessionCards);
            currentIndex = 0;

            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('flashcardWrapper').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'flex';
            document.getElementById('progressText').style.display = 'block';
            document.getElementById('btnBackHome').style.display = 'block';

            showCard();
        }

        function showCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');
            
            const currentCard = sessionCards[currentIndex];
            document.getElementById('cardFront').innerHTML = `<h2>${currentCard.q}</h2>`;
            document.getElementById('cardBack').innerHTML = currentCard.a.map(line => `<p>${line}</p>`).join('');
            document.getElementById('progressText').innerText = `Pytanie ${currentIndex + 1} z ${sessionCards.length}`;
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function markCard(status, event) {
            event.stopPropagation(); // Zapobiega obróceniu karty w momencie kliknięcia przycisku
            const currentCardId = sessionCards[currentIndex].id;
            
            // Zapis do local storage
            userStats[currentCardId] = status;
            localStorage.setItem('obronaStats', JSON.stringify(userStats));

            currentIndex++;
            if (currentIndex < sessionCards.length) {
                showCard();
            } else {
                alert("Koniec pytań na tę sesję! Gratulacje!");
                goHome();
            }
        }

        function resetStats() {
            if(confirm("Czy na pewno chcesz usunąć wszystkie postępy? Zostaną zresetowane znaczniki 'Umiem/Nie umiem'.")) {
                userStats = {};
                localStorage.removeItem('obronaStats');
                updateStatsUI();
                alert("Statystyki zostały zresetowane.");
            }
        }

        function goHome() {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('flashcardWrapper').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('progressText').style.display = 'none';
            document.getElementById('btnBackHome').style.display = 'none';
            updateStatsUI();
        }

        // Inicjalizacja przy starcie strony
        parseData();
        updateStatsUI();
    </script>
</body>
</html>
